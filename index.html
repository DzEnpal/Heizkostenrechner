<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Heizkosten Vergleich</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f3f4f6;
padding:30px;
}

.container{
max-width:1000px;
margin:auto;
}

.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
margin-bottom:20px;
}

h1{
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
font-size:16px;
}

button{
background:#16a34a;
color:white;
border:none;
padding:12px 20px;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

.result{
font-size:24px;
font-weight:bold;
margin-top:20px;
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h1>Heizkosten Vergleich</h1>

<div class="card">

<h2>Eingaben</h2>

Wohnfläche (m²)
<input id="flaeche" type="number" value="140">

Gaspreis (Cent / kWh)
<input id="gaspreis" type="number" value="12">

Strompreis Wärmepumpe (Cent / kWh)
<input id="strompreis" type="number" value="30">

Jahre bis Heizung kaputt
<input id="jahre" type="number" value="5">

Preis Wärmepumpe (€)
<input id="waermepumpepreis" type="number" value="18000">

<br><br>

<button onclick="rechnen()">Berechnen</button>

</div>

<div class="card">

<canvas id="chart"></canvas>

<div class="result" id="ergebnis"></div>

</div>

</div>

<script>

let chart;

function rechnen(){

let flaeche = Number(document.getElementById("flaeche").value)
let gaspreis = Number(document.getElementById("gaspreis").value)
let strompreis = Number(document.getElementById("strompreis").value)
let jahre = Number(document.getElementById("jahre").value)
let wpPreis = Number(document.getElementById("waermepumpepreis").value)

let verbrauch = flaeche * 140

let gasKosten = []
let wpKosten = []

let gasSumme = 0
let wpSumme = 0

for(let i=1;i<=jahre;i++){

let gasJahr = (verbrauch * gaspreis /100) * (1 + i*0.05)

gasSumme += gasJahr
gasKosten.push(Math.round(gasSumme))

let wpJahr = (verbrauch/3.5 * strompreis)/100

wpSumme += wpJahr
wpKosten.push(Math.round(wpSumme))

}

let wartenKosten = gasSumme + wpPreis

let jetztKosten = wpPreis + wpSumme

let diff = wartenKosten - jetztKosten

document.getElementById("ergebnis").innerHTML =
"Warten kostet etwa: "+Math.round(diff)+" € mehr"

let labels = []

for(let i=1;i<=jahre;i++){
labels.push("Jahr "+i)
}

if(chart){
chart.destroy()
}

chart = new Chart(document.getElementById("chart"),{

type:'line',

data:{
labels:labels,
datasets:[

{
label:'Kosten wenn man wartet',
data:gasKosten,
borderColor:'red',
fill:false
},

{
label:'Kosten mit Wärmepumpe jetzt',
data:wpKosten,
borderColor:'green',
fill:false
}

]
}

})

}

</script>

</body>
</html>
